<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ADMIN ACCESS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Consolas, monospace;
    }

    body{
      background:black;
      overflow:hidden;

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      color:#00ff99;
    }

    /* MATRIX BACKGROUND */

    canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-2;
    }

    /* GLOW EFFECT */

    body::after{

      content:"";

      position:fixed;

      inset:0;

      background:
      radial-gradient(
        circle at top,
        rgba(0,255,120,0.08),
        transparent 70%
      );

      z-index:-1;
    }

    /* LOGIN BOX */

    .login-box{

      width:380px;

      background:
      rgba(0,0,0,0.75);

      backdrop-filter:blur(12px);

      border:
      1px solid rgba(0,255,120,0.3);

      border-radius:20px;

      padding:35px;

      box-shadow:
      0 0 20px rgba(0,255,120,0.3),
      0 0 60px rgba(0,255,120,0.15);

      animation:boxGlow 3s infinite alternate;
    }

    @keyframes boxGlow{

      from{
        box-shadow:
        0 0 15px rgba(0,255,120,0.2),
        0 0 40px rgba(0,255,120,0.1);
      }

      to{
        box-shadow:
        0 0 25px rgba(0,255,120,0.5),
        0 0 80px rgba(0,255,120,0.3);
      }

    }

    /* TITLE */

    .title{

      text-align:center;

      margin-bottom:25px;

      font-size:28px;

      font-weight:bold;

      text-shadow:
      0 0 5px #00ff99,
      0 0 20px #00ff99;

      animation:flicker 2s infinite alternate;
    }

    @keyframes flicker{

      from{
        opacity:1;
      }

      to{
        opacity:0.8;
      }

    }

    /* INPUTS */

    input{

      width:100%;

      background:black;

      border:
      1px solid rgba(0,255,120,0.3);

      color:#00ff99;

      padding:14px;

      border-radius:12px;

      margin-bottom:18px;

      outline:none;

      font-size:15px;

      box-shadow:
      inset 0 0 10px rgba(0,255,120,0.08);
    }

    input::placeholder{
      color:#00ff99aa;
    }

    /* BUTTON */

    button{

      width:100%;

      background:black;

      color:#00ff99;

      border:1px solid #00ff99;

      padding:14px;

      border-radius:12px;

      cursor:pointer;

      font-size:16px;

      font-weight:bold;

      transition:0.3s;

      box-shadow:
      0 0 15px rgba(0,255,120,0.2);
    }

    button:hover{

      background:#00ff99;

      color:black;

      transform:translateY(-2px);

      box-shadow:
      0 0 20px #00ff99,
      0 0 50px #00ff99;
    }

    /* SMALL TEXT */

    .bottom-text{

      margin-top:20px;

      text-align:center;

      font-size:13px;

      color:#00ff99aa;
    }

    @media(max-width:500px){

      .login-box{
        width:92%;
        padding:25px;
      }

    }

  </style>

</head>

<body>

  <!-- MATRIX -->
  <canvas id="matrix"></canvas>

  <!-- LOGIN BOX -->

  <div class="login-box">

    <div class="title">
      ⚡ ADMIN ACCESS
    </div>

    <input
      type="email"
      id="email"
      placeholder="Enter Admin Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button onclick="login()">
      INITIATE ACCESS
    </button>

    <div class="bottom-text">
      Secure Cyber Terminal v3.0
    </div>

  </div>

  <!-- MATRIX EFFECT -->

  <script>

    const canvas =
    document.getElementById("matrix");

    const ctx =
    canvas.getContext("2d");

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    const chars =
    "01ABCDEFGHIJKLMNOPQRSTUVWXYZ@$#%^&*";

    const fontSize = 14;

    const columns =
    canvas.width / fontSize;

    const drops = [];

    for(let x = 0; x < columns; x++){

      drops[x] = 1;

    }

    function draw(){

      ctx.fillStyle =
      "rgba(0,0,0,0.05)";

      ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      ctx.fillStyle = "#00ff99";

      ctx.font =
      fontSize + "px monospace";

      for(let i = 0; i < drops.length; i++){

        const text =
        chars.charAt(
          Math.floor(
            Math.random() * chars.length
          )
        );

        ctx.fillText(
          text,
          i * fontSize,
          drops[i] * fontSize
        );

        if(
          drops[i] * fontSize >
          canvas.height &&
          Math.random() > 0.975
        ){

          drops[i] = 0;

        }

        drops[i]++;

      }

    }

    setInterval(draw, 35);

  </script>

  <script
    type="module"
    src="admin-login.js"
  ></script>

</body>
</html>
